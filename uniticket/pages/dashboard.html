<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="UniTicket Dashboard — Vista general de incidencias técnicas en laboratorios.">
  <meta name="robots" content="noindex">
  <title>UniTicket — Dashboard</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <a href="#main" class="skip-link">Saltar al contenido principal</a>

  <header role="banner">
    <nav class="navbar" id="navbar" aria-label="Barra de navegación"></nav>
  </header>

  <main class="container" id="main" role="main">
    <div style="display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:1rem; margin-bottom:.5rem">
      <div>
        <h1 class="page-title" id="dash-title">Dashboard</h1>
        <p class="page-subtitle" id="dash-subtitle">Resumen de incidencias técnicas</p>
      </div>
      <button class="btn btn-primary" id="btn-new-ticket" onclick="openNewTicketModal()" aria-label="Crear nuevo ticket">
        + <span data-i18n="newTicket">Nuevo ticket</span>
      </button>
    </div>

    <!-- Stats -->
    <section aria-label="Estadísticas de tickets">
      <div class="stats-grid" id="stats-grid"></div>
    </section>

    <!-- Filters -->
    <section aria-label="Filtros y búsqueda">
      <div class="filters" role="group" aria-label="Filtrar tickets por estado">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all')" data-i18n="all">Todos</button>
        <button class="filter-btn" data-filter="open" onclick="setFilter('open')" data-i18n="open">Abierto</button>
        <button class="filter-btn" data-filter="progress" onclick="setFilter('progress')" data-i18n="inProgress">En progreso</button>
        <button class="filter-btn" data-filter="resolved" onclick="setFilter('resolved')" data-i18n="resolved">Resuelto</button>
        <input type="search" class="search-input" id="search-input" placeholder="Buscar..."
          aria-label="Buscar tickets" oninput="renderTable()" data-i18n-ph="search">
      </div>
    </section>

    <!-- Table -->
    <section aria-label="Lista de tickets">
      <div class="table-wrap card" style="padding:0">
        <table role="grid" aria-label="Tabla de incidencias técnicas">
          <thead>
            <tr>
              <th scope="col">#</th>
              <th scope="col" data-i18n="location">Ubicación</th>
              <th scope="col" data-i18n="equipmentId">Equipo</th>
              <th scope="col" data-i18n="description">Descripción</th>
              <th scope="col" data-i18n="status">Estado</th>
              <th scope="col" data-i18n="reportDate">Fecha</th>
              <th scope="col">Acción</th>
            </tr>
          </thead>
          <tbody id="tickets-tbody"></tbody>
        </table>
        <div id="empty-state" class="empty-state" style="display:none" aria-live="polite">
          <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          <p data-i18n="noTickets">No hay tickets para mostrar</p>
        </div>
      </div>
    </section>
  </main>

  <!-- Modal nuevo ticket -->
  <div class="modal-overlay" id="modal-new-ticket" role="dialog" aria-modal="true" aria-labelledby="modal-title"
    onclick="if(event.target===this) closeModal()">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title" data-i18n="newTicket">Nuevo ticket</h2>
        <button class="btn-close" onclick="closeModal()" aria-label="Cerrar modal">✕</button>
      </div>
      <form id="form-new-ticket" novalidate>
        <div class="form-group">
          <label for="nt-location" data-i18n="location">Ubicación del laboratorio</label>
          <select id="nt-location" required aria-required="true" aria-describedby="loc-err">
            <option value="">Seleccionar...</option>
            <option>Laboratorio de Redes — Sala A</option>
            <option>Laboratorio de Redes — Sala B</option>
            <option>Sala de Software — Piso 1</option>
            <option>Sala de Software — Piso 2</option>
            <option>Laboratorio de Electrónica</option>
            <option>Laboratorio de Circuitos</option>
          </select>
          <span class="form-error" id="loc-err" role="alert" data-i18n="required">Este campo es obligatorio</span>
        </div>
        <div class="form-group">
          <label for="nt-equipment" data-i18n="equipmentId">ID del equipo</label>
          <input type="text" id="nt-equipment" placeholder="Ej: PC-05, PROYECTOR-01" required
            aria-required="true" aria-describedby="eq-err" maxlength="30">
          <span class="form-error" id="eq-err" role="alert" data-i18n="required">Este campo es obligatorio</span>
        </div>
        <div class="form-group">
          <label for="nt-description" data-i18n="description">Descripción del problema</label>
          <textarea id="nt-description" placeholder="Describe la falla con el mayor detalle posible..." required
            aria-required="true" aria-describedby="desc-err" maxlength="500"></textarea>
          <span class="form-error" id="desc-err" role="alert" data-i18n="required">Este campo es obligatorio</span>
        </div>
        <div class="form-group">
          <label data-i18n="reportDate">Fecha de reporte</label>
          <input type="text" id="nt-date" readonly aria-readonly="true" style="background:#f5f2ee;cursor:default">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="closeModal()" data-i18n="cancel">Cancelar</button>
          <button type="submit" class="btn btn-primary" data-i18n="save">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script>
    const session = requireAuth();
    if (!session) throw new Error('No auth');

    let currentFilter = 'all';

    renderNavbar(session);
    requestNotifPermission();
    renderStats();
    renderTable();
    applyLang();

    document.getElementById('nt-date').value = new Date().toLocaleDateString(currentLang === 'es' ? 'es-CO' : 'en-US');

    function renderStats() {
      const tickets = getTickets();
      // Técnicos y admins ven todos; usuarios estándar solo los suyos
      const visible = (session.role === 'standard') ? tickets.filter(t => t.reporterId === session.id) : tickets;
      const open = visible.filter(t => t.status === 'open').length;
      const progress = visible.filter(t => t.status === 'progress').length;
      const resolved = visible.filter(t => t.status === 'resolved').length;
      document.getElementById('stats-grid').innerHTML = `
        <div class="stat-card"><div class="stat-num">${visible.length}</div><div class="stat-label" data-i18n="total">${t('total')}</div></div>
        <div class="stat-card" style="--accent:#dc2626"><div class="stat-num" style="color:#dc2626">${open}</div><div class="stat-label" data-i18n="openCount">${t('openCount')}</div></div>
        <div class="stat-card" style="--accent:#d97706"><div class="stat-num" style="color:#d97706">${progress}</div><div class="stat-label" data-i18n="progressCount">${t('progressCount')}</div></div>
        <div class="stat-card" style="--accent:#16a34a"><div class="stat-num" style="color:#16a34a">${resolved}</div><div class="stat-label" data-i18n="resolvedCount">${t('resolvedCount')}</div></div>
      `;
    }

    function setFilter(f) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
      renderTable();
    }

    function renderTable() {
      let tickets = getTickets();
      // Filtro por rol
      if (session.role === 'standard') tickets = tickets.filter(t => t.reporterId === session.id);
      // Filtro estado
      if (currentFilter !== 'all') tickets = tickets.filter(t => t.status === currentFilter);
      // Búsqueda
      const q = document.getElementById('search-input').value.toLowerCase();
      if (q) tickets = tickets.filter(t =>
        t.location.toLowerCase().includes(q) ||
        t.equipmentId.toLowerCase().includes(q) ||
        t.description.toLowerCase().includes(q)
      );

      const tbody = document.getElementById('tickets-tbody');
      const empty = document.getElementById('empty-state');

      if (tickets.length === 0) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      const canEdit = session.role === 'technician' || session.role === 'admin';
      tbody.innerHTML = tickets.map(tk => `
        <tr onclick="goDetail(${tk.id})" role="row" tabindex="0"
          onkeydown="if(event.key==='Enter')goDetail(${tk.id})"
          aria-label="Ticket ${tk.id}: ${tk.equipmentId} — ${tk.status}">
          <td><strong>#${tk.id}</strong></td>
          <td>${sanitize(tk.location)}</td>
          <td><code style="background:#f0ede8;padding:2px 6px;border-radius:4px;font-size:12px">${sanitize(tk.equipmentId)}</code></td>
          <td style="max-width:220px"><span style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${sanitize(tk.description)}</span></td>
          <td>${statusBadge(tk.status)}</td>
          <td style="white-space:nowrap;color:var(--text-muted);font-size:13px">${formatDate(tk.date)}</td>
          <td>
            <button class="btn btn-outline btn-sm" onclick="event.stopPropagation();goDetail(${tk.id})"
              aria-label="Ver detalle del ticket ${tk.id}">Ver</button>
          </td>
        </tr>
      `).join('');
    }

    function goDetail(id) {
      window.location.href = `ticket-detail.html?id=${id}`;
    }

    function openNewTicketModal() {
      document.getElementById('modal-new-ticket').classList.add('open');
      document.getElementById('nt-location').focus();
    }
    function closeModal() {
      document.getElementById('modal-new-ticket').classList.remove('open');
      document.getElementById('form-new-ticket').reset();
      ['loc-err','eq-err','desc-err'].forEach(id => document.getElementById(id).classList.remove('show'));
    }

    // Cerrar modal con Escape
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    document.getElementById('form-new-ticket').addEventListener('submit', function(e) {
      e.preventDefault();
      let valid = true;
      const loc = document.getElementById('nt-location').value;
      const eq = document.getElementById('nt-equipment').value.trim();
      const desc = document.getElementById('nt-description').value.trim();

      document.getElementById('loc-err').classList.toggle('show', !loc); if (!loc) valid = false;
      document.getElementById('eq-err').classList.toggle('show', !eq); if (!eq) valid = false;
      document.getElementById('desc-err').classList.toggle('show', !desc); if (!desc) valid = false;
      if (!valid) return;

      const ticket = addTicket({
        location: sanitize(loc),
        equipmentId: sanitize(eq),
        description: sanitize(desc),
        status: 'open',
        reporterId: session.id,
        reporterName: session.name,
        date: new Date().toISOString().slice(0, 10),
        note: '',
        assignedTo: ''
      });

      sendNotification(t('notifTitle'), `${ticket.equipmentId} — ${ticket.location}`);
      showToast(t('ticketCreated'), 'success');
      closeModal();
      renderStats();
      renderTable();
    });
  </script>
</body>
</html>
